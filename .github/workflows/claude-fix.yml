name: Claude Automated Fixes

on:
  # Trigger on issues labeled 'claude-fix'
  issues:
    types: [labeled]

  # Trigger on issue/PR comments containing '@claude'
  issue_comment:
    types: [created]

  # Manual trigger for testing
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Task for Claude to perform'
        required: true
        type: string

jobs:
  claude-fix:
    # Run on label trigger or @claude mention
    if: |
      (github.event_name == 'issues' && github.event.label.name == 'claude-fix') ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      github.event_name == 'workflow_dispatch'

    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Determine prompt
        id: prompt
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "prompt=${{ inputs.prompt }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "issues" ]; then
            echo "prompt=Fix the issue: ${{ github.event.issue.title }}. Details: ${{ github.event.issue.body }}" >> $GITHUB_OUTPUT
          else
            # Extract text after @claude from comment
            COMMENT="${{ github.event.comment.body }}"
            PROMPT=$(echo "$COMMENT" | sed 's/.*@claude[[:space:]]*//')
            echo "prompt=$PROMPT" >> $GITHUB_OUTPUT
          fi

      - name: Run Claude Code
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          npx @anthropic-ai/claude-code --print "${{ steps.prompt.outputs.prompt }}"

      - name: Check for changes
        id: changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "fix: automated fix by Claude"
          title: "[Claude] Automated fix for #${{ github.event.issue.number || 'manual' }}"
          body: |
            ## Automated Fix by Claude

            This PR was automatically generated by Claude Code in response to:
            - **Trigger:** ${{ github.event_name }}
            - **Issue/Comment:** #${{ github.event.issue.number || 'N/A' }}

            ### Changes Made
            Please review the changes carefully before merging.

            ---
            _Generated by Claude Code GitHub Action_
          branch: claude-fix/${{ github.run_id }}
          delete-branch: true

      - name: Comment on issue
        if: github.event.issue.number && steps.changes.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Claude has created a PR with the requested fix. Please review the changes.'
            })

      - name: Comment if no changes
        if: github.event.issue.number && steps.changes.outputs.has_changes == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '⚠️ Claude analyzed the request but no code changes were needed.'
            })
